# manifests/apps/keycloak/base/helmrelease.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak-app
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://charts.bitnami.com/bitnami
      chart: keycloak
      targetRevision: 22.1.0 # Versión del chart estable para Keycloak 26
      helm:
        valueFiles:
          - $values/resources/apps/keycloak/values.yaml
    - repoURL: https://github.com/raullopezepam/mi-repo-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak-ns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true