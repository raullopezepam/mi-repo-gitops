    app: recommendationservice
---
# Source: recommendationservice/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendationservice
  labels:
    helm.sh/chart: recommendationservice-0.1.0
    app.kubernetes.io/name: recommendationservice
    app.kubernetes.io/instance: recommendationservice
    app: recommendationservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: recommendationservice
      app.kubernetes.io/instance: recommendationservice
      app: recommendationservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: recommendationservice
        app.kubernetes.io/instance: recommendationservice
        app: recommendationservice
    spec:
      serviceAccountName: recommendationservice
      securityContext:
        {}
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          securityContext:
            {}
          image: "gcr.io/google-samples/microservices-demo/recommendationservice:v0.2.0"
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 8080
          env:
          - name: PORT
            value: "8080"
          - name: PRODUCT_CATALOG_SERVICE_ADDR
            value: "productcatalogservice:3550"
          - name: DISABLE_TRACING
            value: "1"
          - name: DISABLE_PROFILER
            value: "1"
          - name: DISABLE_DEBUGGER
            value: "1"        
          readinessProbe:
            periodSeconds: 5
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:8080"]
          livenessProbe:
            periodSeconds: 5
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:8080"]
          resources:
            limits:
              cpu: 200m
              memory: 450Mi
            requests:
              cpu: 100m
              memory: 220Mi
---
# Source: recommendationservice/templates/tests/test-connection.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "recommendationservice-test-connection"
  labels:

    helm.sh/chart: recommendationservice-0.1.0
    app.kubernetes.io/name: recommendationservice
    app.kubernetes.io/instance: recommendationservice
    app: recommendationservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test-success
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:  ['recommendationservice:8080']
  restartPolicy: Never
