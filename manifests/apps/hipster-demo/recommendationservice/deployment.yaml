# Source: recommendationservice/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: recommendationservice
  labels:
    helm.sh/chart: recommendationservice-0.1.0
    app.kubernetes.io/name: recommendationservice
    app.kubernetes.io/instance: recommendationservice
    app: recommendationservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
