---
# Source: currencyservice/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice
  labels:
    helm.sh/chart: currencyservice-0.1.0
    app.kubernetes.io/name: currencyservice
    app.kubernetes.io/instance: currencyservice
    app: currencyservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: currencyservice
      app.kubernetes.io/instance: currencyservice
      app: currencyservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: currencyservice
        app.kubernetes.io/instance: currencyservice
        app: currencyservice
    spec:
      serviceAccountName: currencyservice
      securityContext:
        {}
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          securityContext:
            {}
          image: "gcr.io/google-samples/microservices-demo/currencyservice:v0.2.0"
          imagePullPolicy: IfNotPresent
          ports:
          - name: grpc
            containerPort: 7000
          env:
          - name: PORT
            value: "7000"
        # - name: DISABLE_TRACING
        #   value: "1"
        # - name: DISABLE_PROFILER
        #   value: "1"
        # - name: DISABLE_DEBUGGER
        #   value: "1"            
          readinessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:7000"]
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:7000"]
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
---
# Source: currencyservice/templates/tests/test-connection.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "currencyservice-test-connection"
  labels:

    helm.sh/chart: currencyservice-0.1.0
    app.kubernetes.io/name: currencyservice
    app.kubernetes.io/instance: currencyservice
    app: currencyservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test-success
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:  ['currencyservice:7000']
  restartPolicy: Never
