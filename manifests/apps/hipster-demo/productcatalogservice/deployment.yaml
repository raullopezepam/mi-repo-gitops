---
# Source: productcatalogservice/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
  labels:
    helm.sh/chart: productcatalogservice-0.1.0
    app.kubernetes.io/name: productcatalogservice
    app.kubernetes.io/instance: productcatalogservice
    app: productcatalogservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 3550
      targetPort: 3550
      name: grpc
  selector:
    app.kubernetes.io/name: productcatalogservice
    app.kubernetes.io/instance: productcatalogservice
    app: productcatalogservice
---
# Source: productcatalogservice/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  labels:
    helm.sh/chart: productcatalogservice-0.1.0
    app.kubernetes.io/name: productcatalogservice
    app.kubernetes.io/instance: productcatalogservice
    app: productcatalogservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: productcatalogservice
      app.kubernetes.io/instance: productcatalogservice
      app: productcatalogservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: productcatalogservice
        app.kubernetes.io/instance: productcatalogservice
        app: productcatalogservice
    spec:
      serviceAccountName: productcatalogservice
      securityContext:
        {}
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          securityContext:
            {}
          image: "gcr.io/google-samples/microservices-demo/productcatalogservice:v0.2.0"
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 3550
          env:
          - name: PORT
            value: "3550"
        # - name: DISABLE_STATS
        #   value: "1"
        # - name: DISABLE_TRACING
        #   value: "1"
        # - name: DISABLE_PROFILER
        #   value: "1"
        # - name: JAEGER_SERVICE_ADDR
        #   value: "jaeger-collector:14268"            
          readinessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:3550"]
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:3550"]
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
---
# Source: productcatalogservice/templates/tests/test-connection.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "productcatalogservice-test-connection"
  labels:

    helm.sh/chart: productcatalogservice-0.1.0
    app.kubernetes.io/name: productcatalogservice
    app.kubernetes.io/instance: productcatalogservice
    app: productcatalogservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test-success
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:  ['productcatalogservice:3550']
  restartPolicy: Never
