apiVersion: v1
kind: Service
metadata:
  name: redis-cart
  labels:
    helm.sh/chart: redis-cart-0.1.0
    app.kubernetes.io/name: redis-cart
    app.kubernetes.io/instance: redis-cart
    app: redis-cart
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 6379
