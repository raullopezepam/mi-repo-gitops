---
# Source: checkoutservice/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkoutservice
  labels:
    helm.sh/chart: checkoutservice-0.1.0
    app.kubernetes.io/name: checkoutservice
    app.kubernetes.io/instance: checkoutservice
    app: checkoutservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkoutservice
      app.kubernetes.io/instance: checkoutservice
      app: checkoutservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkoutservice
        app.kubernetes.io/instance: checkoutservice
        app: checkoutservice
    spec:
      serviceAccountName: checkoutservice
      securityContext:
        {}
      containers:
        - name: server
          securityContext:
            {}
          image: "gcr.io/google-samples/microservices-demo/checkoutservice:v0.2.0"
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 5050
          readinessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:5050"]
          livenessProbe:
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:5050"]
          env:
          - name: PORT
            value: "5050"
          - name: PRODUCT_CATALOG_SERVICE_ADDR
            value: "productcatalogservice:3550"
          - name: SHIPPING_SERVICE_ADDR
            value: "shippingservice:50051"
          - name: PAYMENT_SERVICE_ADDR
            value: "paymentservice:50051"
          - name: EMAIL_SERVICE_ADDR
            value: "emailservice:5000"
          - name: CURRENCY_SERVICE_ADDR
            value: "currencyservice:7000"
          - name: CART_SERVICE_ADDR
            value: "cartservice:7070"
          # - name: DISABLE_STATS
          #   value: "1"
          # - name: DISABLE_TRACING
          #   value: "1"
          # - name: DISABLE_PROFILER
          #   value: "1"
          # - name: JAEGER_SERVICE_ADDR
          #   value: "jaeger-collector:14268"            
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
---
# Source: checkoutservice/templates/tests/test-connection.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "checkoutservice-test-connection"
  labels:

    helm.sh/chart: checkoutservice-0.1.0
    app.kubernetes.io/name: checkoutservice
    app.kubernetes.io/instance: checkoutservice
    app: checkoutservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": test-success
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:  ['checkoutservice:5050']
  restartPolicy: Never
