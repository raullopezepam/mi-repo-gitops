# resources/apps/keycloak/values.yaml

auth:
  adminUser: user
  # CAMBIO: Usamos el secreto sellado para la contraseña de admin
  existingSecret: keycloak-helm-secrets
  passwordSecretKey: admin-password

image:
  repository: bitnamilegacy/keycloak
  tag: 26.3.1-debian-12-r2

postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql 
    tag: 17.6.0-debian-12-r4 
  volumePermissions:
    enabled: true
    image:
      repository: bitnamilegacy/os-shell
      tag: 12-debian-12-r51
  primary:
    podSecurityContext:
      fsGroup: 1001 
  auth:
    database: keycloak_db
    username: bn_keycloak
    # CAMBIO: Usamos el secreto sellado para la base de datos Vara (Postgres)
    existingSecret: keycloak-helm-secrets
    secretKeys:
      userPasswordKey: password
      # Opcional: si cifraste la del superusuario postgres
      adminPasswordKey: postgres-password

keycloak:
  extraEnvVars:
    - name: KC_DB
      value: postgres
    - name: KC_DB_URL_HOST
      value: keycloak-postgresql
    - name: KC_DB_URL_DATABASE
      value: keycloak_db # Asegura que coincida con postgresql.auth.database
    - name: KC_DB_USERNAME
      value: bn_keycloak

      
keycloakConfigCli:
  enabled: true
  image:
    repository: bitnamilegacy/keycloak-config-cli
    tag: 6.4.0-debian-12-r10
  configuration: 
    realm-epam.json: |
      {
        "realm": "EPAM-Internal",
        "enabled": true,
        "roles": {
          "realm": [
            { "name": "app-admin" },
            { "name": "app-viewer" }
          ]
        },
        "clients": [
          {
            "clientId": "portal-client",
            "enabled": true,
            "publicClient": true,
            "redirectUris": ["*"]
          }
        ]
      }