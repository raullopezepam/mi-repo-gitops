# resources/apps/keycloak/values.yaml
image:
  repository: bitnamilegacy/keycloak
  tag: 26.3.1-debian-12-r2

postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql 
    tag: 17.6.0-debian-12-r4 
  
  # ESTO ARREGLA EL PERMISSION DENIED
  volumePermissions:
    enabled: true
  
  primary:
    podSecurityContext:
      fsGroup: 1001
    containerSecurityContext:
      runAsUser: 1001

  auth:
    database: keycloak_db
    username: bn_keycloak
    password: epam_password

# Automatización del Config CLI
keycloakConfigCli:
  enabled: true
  configuration: 
    realm-epam.json: |
      {
        "realm": "EPAM-Internal",
        "enabled": true,
        "roles": {
          "realm": [
            { "name": "app-admin" },
            { "name": "app-viewer" }
          ]
        },
        "clients": [
          {
            "clientId": "portal-client",
            "enabled": true,
            "publicClient": true,
            "redirectUris": ["*"]
          }
        ]
      }