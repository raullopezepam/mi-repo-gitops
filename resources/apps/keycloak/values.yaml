# resources/apps/keycloak/values.yaml

image:
  repository: bitnamilegacy/keycloak
  tag: 26.3.1-debian-12-r2

# Configuración de persistencia corrigiendo el error de imagen
postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
    tag: 17.6.0-debian-12-r4
  auth:
    database: keycloak_db
    username: bn_keycloak
    password: epam_password

# Automatización del Config CLI
keycloakConfigCli:
  enabled: true
  configuration: 
    realm-epam.json: |
      {
        "realm": "EPAM-Internal",
        "enabled": true,
        "roles": {
          "realm": [
            { "name": "app-admin" },
            { "name": "app-viewer" }
          ]
        },
        "clients": [
          {
            "clientId": "portal-client",
            "enabled": true,
            "publicClient": true,
            "redirectUris": ["*"]
          }
        ]
      }