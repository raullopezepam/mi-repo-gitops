# Source: hipstershop/charts/adservice/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  labels:
    helm.sh/chart: adservice-0.1.0
    app.kubernetes.io/name: adservice
    app.kubernetes.io/instance: hipstershop
    app: adservice
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adservice
      app.kubernetes.io/instance: hipstershop
      app: adservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adservice
        app.kubernetes.io/instance: hipstershop
        app: adservice
    spec:
      serviceAccountName: hipstershop-adservice
      securityContext:
        {}
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          securityContext:
            {}
          image: "gcr.io/google-samples/microservices-demo/adservice:v0.4.0"
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 9555
          env:
            - name: PORT
              value: "9555"
        # - name: DISABLE_STATS
        #   value: "1"
        # - name: DISABLE_TRACING
        #   value: "1"
        # - name: JAEGER_SERVICE_ADDR
        #   value: "jaeger-collector:14268"
          livenessProbe:
            initialDelaySeconds: 20
            periodSeconds: 15
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:9555"]
          readinessProbe:
            initialDelaySeconds: 20
            periodSeconds: 15
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:9555"]
          resources:
            limits:
              cpu: 300m
              memory: 300Mi
            requests:
              cpu: 200m
              memory: 180Mi
