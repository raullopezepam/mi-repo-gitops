    matchLabels:
      app.kubernetes.io/name: cartservice
      app.kubernetes.io/instance: hipstershop
      app: cartservice
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cartservice
        app.kubernetes.io/instance: hipstershop
        app: cartservice
    spec:
      serviceAccountName: hipstershop-cartservice
      securityContext:
        {}
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          securityContext:
            {}
          image: "gcr.io/google-samples/microservices-demo/cartservice:v0.2.0"
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 7070
          env:
          - name: REDIS_ADDR
            value: "redis-cart:6379"
          - name: PORT
            value: "7070"
          - name: LISTEN_ADDR
            value: "0.0.0.0"          
          livenessProbe:
            initialDelaySeconds: 15
            periodSeconds: 10
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:7070", "-rpc-timeout=5s"]
          readinessProbe:
            initialDelaySeconds: 15
            exec:
              command: ["/bin/grpc_health_probe", "-addr=:7070", "-rpc-timeout=5s"]
          resources:
            limits:
              cpu: 300m
              memory: 128Mi
            requests:
              cpu: 200m
              memory: 64Mi
