# Source: hipstershop/charts/cartservice/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  labels:
    helm.sh/chart: cartservice-0.1.0
    app.kubernetes.io/name: cartservice
    app.kubernetes.io/instance: hipstershop
    app: cartservice
