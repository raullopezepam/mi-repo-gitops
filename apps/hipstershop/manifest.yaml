apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgenerator
  labels:
    helm.sh/chart: loadgenerator-0.1.0
    app.kubernetes.io/name: loadgenerator
    app.kubernetes.io/instance: hipstershop
    app: loadgenerator
    app.kubernetes.io/version: "1.16.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loadgenerator
      app.kubernetes.io/instance: hipstershop
      app: loadgenerator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loadgenerator
        app.kubernetes.io/instance: hipstershop
        app: loadgenerator
      annotations:
        sidecar.istio.io/rewriteAppHTTPProbers: "true"        
    spec:
      serviceAccountName: hipstershop-loadgenerator
      securityContext:
        {}
      terminationGracePeriodSeconds: 5
      restartPolicy: Always
      containers:
        - name: main
          securityContext:
            {}
          image: "gcr.io/google-samples/microservices-demo/loadgenerator:v0.2.0"
          imagePullPolicy: IfNotPresent
          env:
          - name: FRONTEND_ADDR
            value: "frontend:80"
          - name: USERS
            value: "10"
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 300m
              memory: 256Mi
---
