apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: argocd
  namespace: argocd
spec:
  server:
    ingress:
      enabled: false
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hipstershop-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/raullopezepam/mi-repo-gitops.git
    path: manifests/apps/__overlays
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true