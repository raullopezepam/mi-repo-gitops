apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hipstershop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/raullopezepam/mi-repo-gitops.git
    targetRevision: HEAD
    path: manifests/apps/hipster-demo/base
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
